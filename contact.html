<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Maxim Kantor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Maxim Kantor</a>
  <button class="nav-toggle" aria-label="Menu" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="nav-links">
    <li><a href="works.html">Works</a></li>
    <li><a href="biography.html">Biography</a></li>
    <li><a href="cv.html">CV</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Contact</h1>
</div>

<div class="contact-wrap">
  <div class="contact-info">
    <p>For enquiries regarding works, exhibitions and press,<br>
    please contact the studio directly:</p>
    <p style="margin-top: 20px;">
      <a href="mailto:maxim.kantor@pmb.ox.ac.uk">maxim.kantor@pmb.ox.ac.uk</a>
    </p>
  </div>

  <div class="contact-form">
    <form action="https://formsubmit.co/maxim.kantor@pmb.ox.ac.uk" method="POST">
      <input type="hidden" name="_subject" value="Enquiry via maximkantor.com">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="contact.html">

      <div class="form-field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </div>
</div>

<footer>
  <span>© 2025 Maxim Kantor</span>
  <span>All rights reserved</span>
</footer>

<script>
function toggleNav() {
  document.getElementById('nav-links').classList.toggle('open');
}
</script>
</body>
</html>
